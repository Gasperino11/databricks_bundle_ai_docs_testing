bundle:
  name: gg_test_dab
  version: 0.0.1

resources:
  jobs:
    hourly_timezone_job:
      name: Hourly Timezone Printer
      tasks:
        - task_key: print_timezones
          notebook_task:
            notebook_path: ./resources/notebooks/timezone_printer
          new_cluster:
            spark_version: 14.3.x-scala2.12
            node_type_id: i3.xlarge
            num_workers: 1
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: America/New_York
