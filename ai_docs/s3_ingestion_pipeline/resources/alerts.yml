resources:
  quality_monitors:
    event_freshness_monitor:
      table_name: "main.gold.daily_event_metrics"
      schedule:
        quartz_cron_expression: "0 0 10 * * ?"
        timezone_id: "UTC"
      notifications:
        on_failure:
          - email_notifications:
              destinations:
                - "data-engineering@acme.com"

  permissions:
    s3_ingestion_job_permissions:
      job_name: "s3_ingestion_job"
      access_control_list:
        - group_name: "data-engineering"
          permission_level: "CAN_MANAGE"
        - group_name: "data-analysts"
          permission_level: "CAN_VIEW"
