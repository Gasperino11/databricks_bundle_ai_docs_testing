name: Write Ad-Hoc DAB Documentation

on:
  workflow_dispatch:
    inputs:
      folder_path:
        description: "Path to the DAB folder to document (e.g., data_eng/my_pipeline). Must contain databricks.yml and README.md."
        required: true

jobs:
  write-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate DAB folder
        run: |
          FOLDER="${{ github.event.inputs.folder_path }}"
          if [ ! -f "$FOLDER/databricks.yml" ]; then
            echo "Error: No databricks.yml found in '$FOLDER'"
            exit 1
          fi
          if [ ! -f "$FOLDER/README.md" ]; then
            echo "Error: No README.md found in '$FOLDER'"
            exit 1
          fi
          echo "Found DAB at: $FOLDER"

      - name: Dispatch Copilot write agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const folderPath = '${{ github.event.inputs.folder_path }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              "## Task: Write DAB Documentation",
              "",
              `This task was triggered manually via workflow run [#${context.runId}](${runUrl}).`,
              "",
              "Please use the **write-dab-documentation** skill (`.github/agents/skills/write-dab-documentation.md`) to document the Databricks Asset Bundle below.",
              "The original README template can always be found at `templates/README_TEMPLATE.md`.",
              "",
              "### DAB to Document",
              `- \`${folderPath}\``,
              "",
              "### Instructions",
              "1. Follow the `write-dab-documentation` skill for the DAB path above.",
              "2. Replace the template README content with fully generated documentation.",
              "3. Commit the updated README to the default branch."
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Write DAB documentation: ${folderPath}`,
              body,
              assignees: ['copilot']
            });
