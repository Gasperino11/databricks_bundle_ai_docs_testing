name: Write Ad-Hoc DAB Documentation

on:
  workflow_dispatch:
    inputs:
      folder_path:
        description: "Path to the DAB folder to document (e.g., data_eng/my_pipeline). Must contain databricks.yml and README.md."
        required: true

jobs:
  write-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate DAB folder
        env:
          FOLDER: ${{ github.event.inputs.folder_path }}
        run: |
          if [ ! -f "$FOLDER/databricks.yml" ]; then
            echo "Error: No databricks.yml found in '$FOLDER'"
            exit 1
          fi
          if [ ! -f "$FOLDER/README.md" ]; then
            echo "Error: No README.md found in '$FOLDER'"
            exit 1
          fi
          echo "Found DAB at: $FOLDER"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate DAB documentation
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FOLDER_PATH: ${{ github.event.inputs.folder_path }}
        run: python scripts/dispatch_copilot.py write-adhoc

      - name: Commit and push generated documentation
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
          else
            git commit -m "docs: auto-generate DAB README for ${{ github.event.inputs.folder_path }} [skip ci]"
            git push
          fi
