name: Review DAB Documentation

on:
  workflow_dispatch:
    inputs:
      dab_path:
        description: "Path to a specific DAB to review (e.g., data_eng/s3_ingestion_pipeline). Leave empty to review all in ai_docs/"
        required: false
        default: ""
      ai_docs_dir:
        description: "Directory containing DABs to review (used in batch mode)"
        required: false
        default: "ai_docs"
      output_dir:
        description: "Directory to move reviewed DABs to"
        required: false
        default: "data_eng"

jobs:
  review-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install 'github-copilot-sdk==0.2.2'

      - name: Dispatch Copilot reviewer agent
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DAB_PATH="${{ github.event.inputs.dab_path }}"
          if [ -n "$DAB_PATH" ]; then
            python scripts/dispatch_agent.py review-single \
              --dab-path "$DAB_PATH"
          else
            python scripts/dispatch_agent.py review-batch \
              --ai-docs-dir "${{ github.event.inputs.ai_docs_dir || 'ai_docs' }}" \
              --output-dir "${{ github.event.inputs.output_dir || 'data_eng' }}"
          fi
