name: Review DAB Documentation

on:
  workflow_run:
    workflows: ["Write DAB Documentation"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dab_path:
        description: "Path to a specific DAB to review (e.g., data_eng/s3_ingestion_pipeline)"
        required: false
        default: ""

jobs:
  review-docs:
    runs-on: ubuntu-latest
    # Only run if the writer workflow succeeded (for automatic trigger) or always on manual dispatch
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install 'github-copilot-sdk==0.2.2'

      - name: Dispatch Copilot reviewer agent
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          DAB_PATH="${{ github.event.inputs.dab_path }}"
          if [ -n "$DAB_PATH" ]; then
            python scripts/dispatch_agent.py reviewer \
              --dab-path "$DAB_PATH"
          else
            python scripts/dispatch_agent.py reviewer \
              --scan-dir data_eng
          fi
