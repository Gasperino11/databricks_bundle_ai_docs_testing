name: Write DAB Documentation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "ai_docs/**"
  workflow_dispatch:
    inputs:
      ai_docs_dir:
        description: "Directory containing DABs to document"
        required: false
        default: "ai_docs"

jobs:
  write-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install github-copilot-sdk

      - name: Dispatch Copilot writer agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/dispatch_agent.py writer \
            --ai-docs-dir "${{ github.event.inputs.ai_docs_dir || 'ai_docs' }}"
