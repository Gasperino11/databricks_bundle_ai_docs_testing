name: Write DAB Documentation

on:
  workflow_dispatch:
    inputs:
      ai_docs_dir:
        description: "Directory containing DABs to document"
        required: false
        default: "ai_docs"
      skip_review:
        description: "Skip triggering the reviewer agent after writing"
        required: false
        type: boolean
        default: false
  issues:
    types: [opened, labeled]

jobs:
  write-docs:
    # Run when manually dispatched OR when an issue is labeled 'write-dab-docs'
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'write-dab-docs'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Copilot issue for documentation writing
        uses: actions/github-script@v7
        with:
          script: |
            const aiDocsDir = context.payload.inputs?.ai_docs_dir || 'ai_docs';
            const skipReview = context.payload.inputs?.skip_review || false;

            // Read the writer agent prompt
            const fs = require('fs');
            const agentPrompt = fs.readFileSync('agents/writer-agent.md', 'utf8');

            // Discover DABs in the ai_docs directory
            const dabDirs = fs.readdirSync(aiDocsDir, { withFileTypes: true })
              .filter(d => d.isDirectory())
              .filter(d => fs.existsSync(`${aiDocsDir}/${d.name}/databricks.yml`))
              .map(d => d.name);

            if (dabDirs.length === 0) {
              console.log('No DABs found in ' + aiDocsDir);
              return;
            }

            console.log(`Found ${dabDirs.length} DAB(s) to document: ${dabDirs.join(', ')}`);

            // Create an issue that assigns Copilot to write documentation
            const dabList = dabDirs.map(d => `- \`${aiDocsDir}/${d}/\``).join('\n');

            const issueBody = `## Task: Write DAB Documentation

            @copilot Please write documentation for the following Databricks Asset Bundles:

            ${dabList}

            ### Instructions

            Follow the instructions in \`agents/writer-agent.md\` to generate documentation.

            For each DAB listed above:
            1. Read \`databricks.yml\`, all files in \`src/\`, and all files in \`resources/\`
            2. Read the \`README.md\` template (which follows the structure from \`templates/README_TEMPLATE.md\`)
            3. Replace the README.md with fully completed documentation following the template instructions
            4. Remove all \`<!-- INSTRUCTIONS: ... -->\` comment blocks from the output

            The template is at \`templates/README_TEMPLATE.md\` for reference.

            ${skipReview ? '' : 'After completing the documentation, open a new issue with the label `review-dab-docs` to trigger the reviewer agent.'}
            `.replace(/^            /gm, '');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📝 Write DAB Documentation: ${dabDirs.join(', ')}`,
              body: issueBody,
              labels: ['copilot']
            });

            console.log(`Created issue #${issue.data.number}`);
