name: Write and Review PR DAB Documentation

on:
  pull_request:
    types: [opened]

jobs:
  write-and-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Detect DABs with template READMEs
        id: detect
        run: |
          dab_list=""
          while IFS= read -r -d '' yml; do
            dir=$(dirname "$yml")
            readme="$dir/README.md"
            if [ -f "$readme" ] && grep -q "<!-- INSTRUCTIONS:" "$readme"; then
              rel_dir="${dir#./}"
              dab_list="${dab_list}${rel_dir}\n"
            fi
          done < <(find . -name "databricks.yml" -not -path "./.git/*" -print0)

          if [ -n "$dab_list" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            {
              echo "dab_list<<EOF"
              printf "%b" "$dab_list"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch Copilot write agent
        if: steps.detect.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const branch = context.payload.pull_request.head.ref;
            const dabPaths = `${{ steps.detect.outputs.dab_list }}`
              .split('\n')
              .map(p => p.trim())
              .filter(Boolean);

            const body = [
              "## Task: Write DAB Documentation",
              "",
              `This task was triggered by PR #${prNumber} on branch \`${branch}\`.`,
              "",
              "Please use the **write-dab-documentation** skill (`.github/agents/skills/write-dab-documentation.md`) to document each Databricks Asset Bundle listed below.",
              "Each listed directory contains a `databricks.yml` and a `README.md` that still has template placeholder content.",
              "The original README template can always be found at `templates/README_TEMPLATE.md`.",
              "",
              "### DABs to Document",
              ...dabPaths.map(p => `- \`${p}\``),
              "",
              "### Instructions",
              "1. For each DAB path above, follow the `write-dab-documentation` skill.",
              "2. Replace the template README content with fully generated documentation.",
              `3. Commit the updated README(s) directly to branch \`${branch}\`.`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Write DAB documentation for PR #${prNumber}`,
              body,
              assignees: ['copilot']
            });

      - name: Request Copilot PR review
        if: steps.detect.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['copilot']
            });
