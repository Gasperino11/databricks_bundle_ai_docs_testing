name: Chain Writer to Reviewer

# Automatically triggers the Review workflow when a Writer agent PR is merged
on:
  pull_request:
    types: [closed]
    paths:
      - "ai_docs/**/README.md"

jobs:
  trigger-review:
    # Only run when a writer-labeled PR is merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests github-copilot-sdk

      - name: Dispatch Copilot reviewer agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/dispatch_agent.py reviewer \
            --ai-docs-dir ai_docs \
            --output-dir data_eng \
            --pr-number "${{ github.event.pull_request.number }}"
