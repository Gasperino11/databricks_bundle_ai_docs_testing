name: Chain Writer to Reviewer

# Automatically triggers the Review workflow when a Writer agent PR is merged
on:
  pull_request:
    types: [closed]
    paths:
      - "ai_docs/**/README.md"

jobs:
  trigger-review:
    # Only run when a writer-labeled PR is merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Copilot reviewer issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const aiDocsDir = 'ai_docs';
            const outputDir = 'data_eng';

            // Discover DABs that need review
            const dabDirs = fs.readdirSync(aiDocsDir, { withFileTypes: true })
              .filter(d => d.isDirectory())
              .filter(d => fs.existsSync(`${aiDocsDir}/${d.name}/databricks.yml`))
              .map(d => d.name);

            if (dabDirs.length === 0) {
              console.log('No DABs found in ' + aiDocsDir + ' to review — the writer may not have added any.');
              return;
            }

            const dabList = dabDirs.map(d => `- \`${aiDocsDir}/${d}/\``).join('\n');

            const issueBody = `## Task: Review DAB Documentation (Batch — Auto-triggered)

            @copilot The Writer agent's PR #${context.payload.pull_request.number} has been merged. Please review the documentation for the following Databricks Asset Bundles:

            ${dabList}

            ### Instructions

            Follow the instructions in \`.github/agents/reviewer-agent.md\` using **Mode 1: Batch Review**.

            For each DAB listed above:
            1. Read the \`README.md\`
            2. Read all code and config files (\`databricks.yml\`, \`src/*.py\`, \`resources/*.yml\`)
            3. Cross-reference the documentation against the code
            4. Write a \`REVIEW.md\` in the DAB root with any issues found (include file paths and line numbers)
            5. Move the DAB subfolder from \`${aiDocsDir}/\` to \`${outputDir}/\`

            The review format and checks are documented in \`.github/agents/reviewer-agent.md\`.
            `.replace(/^            /gm, '');

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔍 Review DAB Documentation: ${dabDirs.join(', ')} (auto-chained)`,
              body: issueBody,
              labels: ['copilot', 'dab-docs-reviewer'],
              assignees: ['copilot']
            });

            console.log(`Created reviewer issue #${issue.data.number} after writer PR #${context.payload.pull_request.number} was merged`);
